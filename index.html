    // 亂碼解碼特效
    const DecodeText = ({ text }) => {
      const [displayText, setDisplayText] = useState(text.replace(/./g, '#')); 
      const [isVisible, setIsVisible] = useState(false);
      const elementRef = useRef(null);
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+{}:<>?~`-=[]\\;',./01";

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { setIsVisible(true); observer.disconnect(); }
          }, { threshold: 0.1 });
        if (elementRef.current) observer.observe(elementRef.current);
        return () => observer.disconnect();
      }, []);

      useEffect(() => {
        if (!isVisible) return;
        let iteration = 0;
        const step = Math.max(1, text.length / 30); 
        let interval = setInterval(() => {
          setDisplayText(
            text.split("").map((letter, index) => {
                if (index < Math.floor(iteration)) return text[index];
                return chars[Math.floor(Math.random() * chars.length)];
              }).join("")
          );
          if (iteration >= text.length) clearInterval(interval);
          iteration += step; 
        }, 40);
        return () => clearInterval(interval);
      }, [text, isVisible]);
      return <span ref={elementRef} className="font-mono">{displayText}</span>;
    };

    // 內部置頂文章組件
    const Article1Content = () => (
      <article className="prose prose-invert max-w-none text-[#C4B2A7] text-lg leading-relaxed space-y-8 fade-in-slow">
        <p className="text-xl text-[#E8D8CE] font-medium leading-normal">
          我做日文翻譯十幾年了。身為一個異性戀直男，常遇到讓我哭笑不得的情況。朋友或知道我職業的人，總愛用曖昧眼神調侃：「欸，那你平常看片，不就連他們在叫什麼、說什麼聽得一清二楚？這技能超爽的吧！」
        </p>
        <p>說實話，我以前聽到這種話都在心裡翻白眼。拜託，誰看 A 片會在那邊跟你認真聽劇情？大家不都嘛是褲子一脫，把時間軸瘋狂往右拉，直接略過前面那些無謂的鋪陳，直接跳到最精采的動作戲。在那個只求趕快解決的階段，我還真的從來沒有靜下心來，聽聽裡面的角色到底在講什麼鬼。畢竟在活塞運動時，那些對白標誌只是雜音。</p>
        <p>直到有一次，我真的閒到發慌，無聊到極點。我點開一部片，破天荒把手移開滑鼠，強迫自己不准快轉。我就盯著畫面，腦子裡的日文雷達跟著啟動，自然而然把對白全部翻進腦海裡。</p>
        <h3 className="text-2xl font-bold text-[#FF7A50] mt-12 mb-6 border-l-4 border-[#00E5FF] pl-4">結果你猜怎麼樣？感覺簡直像是發現了新大陸！</h3>
        <p>當你完全聽懂他們在調情、在挑逗、在特定的劇情設定下講出的那些羞恥台詞時，那種前所未有的「帶入感」讓我整個人都陷進去了。我第一次發現，原來成人影片除了純粹的視覺刺激以外，當視覺、聽覺和情節結合在一起，那種迷人的程度，根本不是以前只看肉搏戲可以比擬的。</p>
        <p>看片看了十幾年，說實話，市面上那種照公式拍的成人片，早就滿足不了我了。像是完全沒劇情的單體女優片——開頭隨便演個幾分鐘假面試或訪談，接著就直接切進沒什麼對白的肉搏大戰——這種片我現在完全不看，連點開的欲望都沒有。</p>
        <p>後來我開始變得很挑，反而迷上那些劇情設定很重的單體企劃片，甚至是那種女優是誰都不重要的素人企劃。要在這麼多影片裡，挖出那些情節精采、能讓我產生「性趣」的作品，這才是我現在看片最大的樂趣。</p>
        <div className="bg-[#150F0D] border border-[#3E2C24] rounded-xl p-6 my-8">
          <p className="text-[#E8D8CE] font-bold text-xl mb-0 leading-relaxed">而把這些連我自己看了都入迷的好東西，用我的專業翻譯出來，讓大家能不受語言限制，體會到我當初感受到的那種帶入感——這就是我開始翻譯成人影片的初衷。</p>
        </div>
      </article>
    );

    const Article2Content = () => (
      <article className="prose prose-invert max-w-none text-[#C4B2A7] text-lg leading-relaxed space-y-8 fade-in-slow">
        <p className="text-xl text-[#E8D8CE] font-medium leading-normal">
          大家對成人影片總是有種改不掉的偏見，覺得重點全在「肉搏動作戲」。至於前面的鋪陳、事後的溫存，甚至是過程中的對話，都被當作沒意義的過場。但我每次聽到這種說法，都只想反問一個最簡單的問題：「如果這些橋段真的那麼不重要，那片商幹嘛還要花時間、花錢拍？」
        </p>
        <p>其實，「情境」是成人影片非常重要的一環。就像我上一篇說過的，自從我真正開始「聽懂」A 片對白，反而更能融入劇情。那種帶入感讓觀影（或是實戰使用時）變得更興奮。尤其我現在專找「企劃類」的作品看，裡面那些情節怎麼跑、對白怎麼說，那才是真正的靈魂。說真的，那種講究程度完全不輸給一般的影視作品。</p>
        <h3 className="text-2xl font-bold text-[#FF7A50] mt-12 mb-6 border-l-4 border-[#00E5FF] pl-4">也因為這樣，成人影片的翻譯難度絕對不比一般影視作品低，甚至很多時候，那個難度更有過之而無不及。為什麼？</h3>
        <p>我歸納出幾個常讓我翻到想砸鍵盤的原因：</p>
        <ol className="list-decimal pl-6 space-y-4 text-[#C4B2A7] marker:text-[#FF7A50] marker:font-bold">
          <li><strong className="text-[#E8D8CE]">生活化與流行語：</strong> 成人片的情節通常都從日常生活中取材，對白非常生活化。加上人在床上的時候，講話本來就沒什麼邏輯，裡面塞了一堆你在正規日文課本、檢定考裡絕對學不到的情色術語和流行語。字典根本查不到，你只能靠經驗去抓那個語感。</li>
          <li><strong className="text-[#E8D8CE]">演員咬字與音量失控：</strong> 成人片的演員畢竟不是科班出身，沒受過什麼正統的發聲咬字訓練。很多時候對白根本整句糊在嘴裡，含滷蛋就算了，音量大小的落差還完全失控。前一秒還在用正常音量說話，下一秒突然在你耳邊講悄悄話，那種氣音有時候小到我把耳機音量開到緊繃，還是聽不出來她到底在碎碎念什麼。</li>
          <li><strong className="text-[#E8D8CE]">災難級的收音環境：</strong> 這點最要命。大家要知道，成人片的製作預算通常比一般電影低很多。拍攝現場大多沒有專業收音師幫忙舉桿，很多時候直接靠攝影機收音。既然收音這麼陽春，當然更別指望會有事後進錄音室配音這回事。像是冷氣聲、摩鐵的流水聲，有時候甚至連肉體碰撞的聲音大一點，對白就會直接被吃掉，你連聲音都聽不清楚。</li>
          <li><strong className="text-[#E8D8CE]">隨便的後製剪輯：</strong> 有些成人片的後製剪輯真的很隨便，配樂不知道在大聲幾點的。常常男女主角在情話綿綿的時候，一段俗爛的 BGM 直接把對白蓋掉，根本不打算給翻譯活路。</li>
        </ol>
        <div className="bg-[#150F0D] border border-[#3E2C24] rounded-xl p-6 my-8 flex items-start gap-4 shadow-lg">
          <Terminal className="w-6 h-6 text-[#00E5FF] mt-1 flex-shrink-0" />
          <div>
            <h4 className="text-[#E8D8CE] font-bold mb-2 m-0">開啟翻譯最高境界：「通靈」</h4>
            <p className="text-sm m-0 leading-relaxed"><DecodeText text="說了這麼多，有時候遇到那種死活聽不懂的句子，我也只能雙手合十，開啟翻譯界的最高境界——「通靈」。沒錯，就是自己下海當編劇，靠著前後文的邏輯跟現場氣氛，把那句對白合理地「補」出來，讓整段劇情看起來順暢。" /></p>
          </div>
        </div>
        <p>現在很多人會說，AI 技術這麼發達，用語音辨識工具不就好了？但我老實告訴你，面對上面這些收音地獄和含糊咬字，現在的 AI 工具常常直接產生幻覺，開始胡言亂語。</p>
        <p>不過話說回來，雖然 AI 沒辦法幫我通靈聽懂每一句氣音，但它在我平常的工作流程中，真的幫了大忙。在我翻譯時，AI 工具讓我的效率變快很多。至於我到底是用什麼軟體、這套結合 AI 的工作流程長什麼樣子？</p>
        <p className="text-[#00E5FF] font-medium italic mt-8 border-t border-[#3E2C24] pt-6">下一篇我會全部公開。內容品質絕對直追線上課程，各位敬請期待。</p>
      </article>
    );

    const Article3Content = () => {

          </div>

          <h3 className="text-2xl font-bold text-[#F5ECE6] flex items-center gap-2 mt-12 mb-6">
            <Cpu className="w-6 h-6 text-[#00E5FF]" /> 其實邏輯並不難，我主要使用到的工具組合如下：

              <div className="text-[#917E75] text-xs font-mono mb-2">AV 特化開源 AI 工具</div>
              <div className="text-[#00E5FF] font-bold">WhisperJAV</div>

            <div className="bg-[#1A120E] border border-[#3E2C24] p-4 rounded-lg text-center">
              <div className="text-[#917E75] text-xs font-mono mb-2">開發者工具</div>

          <p>
            首先是 <span className="font-bold text-[#F5ECE6]">Subtitle Edit</span>。我原本用 Aegisub 做字幕用了很多年，但它後來停止更新，導致很多新的影像格式跑不動或出問題。這套軟體最厲害的地方在於它整合了 OpenAI 的 Whisper 語音辨識，可以自動抓出大略的時間軸和逐字稿。
          </p>

          <p>
            當辨識效果爛到讓人崩潰時，我的對策就是：「<span className="text-[#FF7A50] font-bold">以 AI 制 AI</span>」。我找來了日本成人影片特化的開源工具 <span className="font-bold text-[#F5ECE6]">WhisperJAV</span>。這個工具針對日本成人影片做了很多優化，最強的功能是它可以同時跑兩個不同的辨識模型，最後再進行對比整合。
          </p>

          <p>
            如果以上方法都還是聽不清楚，那我就會動用 <span className="font-bold text-[#F5ECE6]">Google AI Studio</span>。透過它我可以避開網頁版嚴格的道德審查，強迫它幫我抓出我要的時間軸和逐字稿。
          </p>

          <div className="bg-[#362720]/30 p-8 rounded-2xl border border-dashed border-[#4A362D] text-center my-12">
            <p className="m-0 italic text-[#C4B2A7]">
              如果這三組 AI 加上我的人耳都還聽不出來……那真的沒救了，請直接開啟「通靈模式」，開始創作你的故事吧。
            </p>
          </div>

          <p>
            寫到這裡，其實都還只是在「抓逐字稿」而已。關於翻譯，只要能確保逐字稿的正確性，我就能翻得出來。這是我學習日文超過二十年、從事翻譯十幾年累積下來的自負。
          </p>

          <p className="text-center font-bold text-[#00E5FF] py-6 border-y border-[#3E2C24]">
            我想用翻譯幫助大家「理解」成人內容。
          </p>

          {/* 三層式靈魂拷問結語互動區 */}
          <section className="mt-16 space-y-4">
            <div className="text-center text-[#917E75] text-sm mb-4 font-mono">// 靈魂拷問解鎖機制已啟動 //</div>
            
            <div className={`transition-all duration-500 overflow-hidden ${step >= 0 ? 'max-h-20 opacity-100' : 'max-h-0 opacity-0'}`}>
              <button 
                onClick={() => setStep(1)}
                className={`w-full p-4 rounded-lg border text-left flex items-center justify-between transition-all ${step === 0 ? 'border-[#00E5FF] bg-[#00E5FF]/5 text-[#00E5FF] hover:bg-[#00E5FF]/10' : 'border-[#3E2C24] text-[#917E75]'}`}
                disabled={step !== 0}
              >
                <span>Q1：你是不是只想不勞而獲求片資源？</span>
                {step === 0 && <ChevronDown className="w-5 h-5 animate-bounce" />}
              </button>
            </div>

            <div className={`transition-all duration-500 overflow-hidden ${step >= 1 ? 'max-h-20 opacity-100' : 'max-h-0 opacity-0'}`}>
              <button 
                onClick={() => setStep(2)}
                className={`w-full p-4 rounded-lg border text-left flex items-center justify-between transition-all ${step === 1 ? 'border-[#FF7A50] bg-[#FF7A50]/5 text-[#FF7A50] hover:bg-[#FF7A50]/10' : 'border-[#3E2C24] text-[#917E75]'}`}
                disabled={step !== 1}
              >
                <span>Q2: 你能理解翻譯背後付出的時間成本與磨練嗎？</span>
                {step === 1 && <ChevronDown className="w-5 h-5 animate-bounce" />}
              </button>
            </div>

            <div className={`transition-all duration-700 overflow-hidden ${step >= 2 ? 'max-h-64 opacity-100 mt-6' : 'max-h-0 opacity-0'}`}>
              <div className="bg-[#1A120E] border-2 border-[#00E5FF] p-8 rounded-xl text-center shadow-[0_0_20px_rgba(0,229,255,0.1)]">
                <h4 className="text-xl font-bold text-[#F5ECE6] mb-4">既然你明白了這份重量。</h4>
                <p className="text-[#C4B2A7] mb-8">歡迎來到我的創作空間，與我深入交流。</p>
                <a 
                  href="https://portaly.cc/AdultArtist" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center gap-2 bg-[#00E5FF] text-[#110C0A] px-10 py-4 rounded-full font-extrabold hover:bg-white transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(0,229,255,0.5)]"
                >
                  前往我的 Portaly <ExternalLink className="w-5 h-5" />
                </a>
              </div>
            </div>
          </section>

          <p className="text-[#917E75] italic text-center pt-8">
            之後的文章，我會開始寫一些具體的作品。我們下篇見。
          </p>
        </article>
      );
    };

    // SPA 文章切換頁面 (只服務置頂文章)
    const ArticlePage = ({ article, onBack }) => {
      useEffect(() => { window.scrollTo(0, 0); }, [article?.id]);
      if (!article) return <div className="text-center py-20">文章載入錯誤</div>;

      const renderArticleContent = () => {
        switch (article.id) {
          case 'p1': return <Article1Content />;
          case 'p2': return <Article2Content />;
          case 'p3': return <Article3Content />;
          default: return <p>文章找不到...</p>;
        }
      };
      
      return (
        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12 fade-in-fast">
          <button onClick={onBack} className="inline-flex items-center text-[#917E75] hover:text-[#00E5FF] transition-colors mb-8 group font-medium">
            <ArrowLeft className="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" /> 返回首頁
          </button>
          <header className="mb-12 border-b border-[#3E2C24] pb-8">
            <div className="flex items-center gap-3 mb-6">
              <span className="text-sm font-semibold px-3 py-1 bg-[#1A120E] text-[#00E5FF] rounded-md border border-[#3E2C24]">{article.category}</span>
              <span className="text-sm font-mono text-[#917E75]">{article.date}</span>
            </div>
            <h1 className="text-3xl md:text-5xl font-extrabold text-[#F5ECE6] leading-tight mb-6 drop-shadow-sm">{article.title}</h1>
            <div className="flex items-center gap-3 text-[#C4B2A7]">
              <div className="w-10 h-10 rounded-full bg-[#362720] flex items-center justify-center border border-[#4A362D]"><User className="w-5 h-5 text-[#FF7A50]" /></div>
              <div>
                <div className="font-medium text-[#E8D8CE]">{personalInfo.name}</div>
                <div className="text-xs text-[#917E75]">發布於個人日誌</div>
              </div>
            </div>
          </header>
          {renderArticleContent()}
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      
      // 控制近期文章的分頁狀態
      const [recentPage, setRecentPage] = useState(1);
      const itemsPerPage = 3;

      // 自動將近期文章「按照日期排序 (新 -> 舊)」
      const sortedRecentArticles = useMemo(() => {
        return [...recentArticlesData].sort((a, b) => new Date(b.date) - new Date(a.date));
      }, []);

      // 計算總頁數，以及擷取「目前這頁」要顯示的 3 篇文章
      const totalPages = Math.ceil(sortedRecentArticles.length / itemsPerPage);
      const currentRecentArticles = sortedRecentArticles.slice(
        (recentPage - 1) * itemsPerPage, 
        recentPage * itemsPerPage
      );

      const renderHome = () => (
        <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-16 fade-in">
          {/* 首圖區塊 */}
          <section className="relative rounded-2xl overflow-hidden shadow-[0_0_40px_rgba(255,122,80,0.1)] border border-[#4A362D] group">
            <div className="absolute inset-0 bg-gradient-to-t from-[#251A15] via-[#251A15]/40 to-transparent z-10"></div>
            <img src="https://drive.google.com/thumbnail?id=1Xf1vkkC26rL4xf8og3ejL1tF0ELCUJlp&sz=w1366" alt="Adult Artist's Workspace" className="w-full h-[45vh] md:h-[65vh] object-cover object-center transform transition-transform duration-1000 group-hover:scale-105" />
            <div className="absolute bottom-0 left-0 right-0 p-6 md:p-10 z-20">
              <div className="inline-flex items-center gap-2 bg-[#00E5FF]/10 border border-[#00E5FF]/30 text-[#00E5FF] font-mono font-bold px-3 py-1 rounded-sm text-sm mb-4 backdrop-blur-sm">
                <span className="w-2 h-2 rounded-full bg-[#00E5FF] animate-pulse"></span> SYSTEM ONLINE //
              </div>
              <h1 className="text-3xl md:text-5xl font-extrabold text-[#F5ECE6] mb-3 drop-shadow-lg">探索語言與藝術的交界</h1>
              <p className="text-[#C4B2A7] md:text-lg max-w-2xl drop-shadow-md">用翻譯為作品注入靈魂，帶你理解更深層的故事。</p>
            </div>
          </section>

          {/* 關於我區塊 */}
          <section id="about" className="scroll-mt-20">
            <div className="flex items-center gap-2 mb-8">
              <User className="w-6 h-6 text-[#FF7A50]" />
              <h2 className="text-2xl font-bold text-[#F5ECE6]">關於我</h2>
              <div className="h-px bg-[#3E2C24] flex-grow ml-4"></div>
            </div>
            <div className="grid md:grid-cols-3 gap-8 items-start">
              <div className="md:col-span-2 space-y-6 text-lg leading-relaxed text-[#C4B2A7]">
                <p>{personalInfo.bio}</p>
                <div className="flex flex-col gap-3">
                  <h3 className="text-[#E8D8CE] font-semibold flex items-center gap-2"><Cpu className="w-5 h-5 text-[#00E5FF]" /> 專業領域</h3>
                  <div className="flex flex-wrap gap-2 mt-2">
                    {personalInfo.skills.map((skill, index) => (
                      <span key={index} className="bg-[#362720] border border-[#4A362D] text-[#E8D8CE] px-3 py-1.5 rounded-md text-sm font-medium hover:border-[#00E5FF] hover:text-[#00E5FF] transition-all cursor-default shadow-sm">{skill}</span>
                    ))}
                  </div>
                </div>
              </div>
              <div className="bg-[#150F0D] border border-[#3E2C24] rounded-xl p-6 font-mono text-sm shadow-xl relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#00E5FF] to-[#FF7A50]"></div>
                <div className="flex gap-2 mb-6">
                  <div className="w-3 h-3 rounded-full bg-[#FF5F56] border border-[#E0443E]"></div>
                  <div className="w-3 h-3 rounded-full bg-[#FFBD2E] border border-[#DEA123]"></div>
                  <div className="w-3 h-3 rounded-full bg-[#27C93F] border border-[#1AAB29]"></div>
                </div>
                <div className="space-y-2 text-[#C4B2A7]">
                  <p><span className="text-[#00E5FF]">const</span> <span className="text-[#FF7A50]">creator</span> = {'{'}</p>
                  <p className="pl-4">name: <span className="text-[#AEE684]">'{personalInfo.name}'</span>,</p>
                  <p className="pl-4">role: <span className="text-[#AEE684]">'{personalInfo.title}'</span>,</p>
                  <p className="pl-4">status: <span className="text-[#AEE684]">'Translating && Creating'</span></p>
                  <p>{'}'};</p>
                </div>
              </div>
            </div>
          </section>

          {/* 置頂文章區塊 */}
          <section id="pinned-articles" className="scroll-mt-20">
            <div className="flex items-center gap-2 mb-8">
              <BookOpen className="w-6 h-6 text-[#FF7A50]" />
              <h2 className="text-2xl font-bold text-[#F5ECE6]">置頂文章</h2>
              <div className="h-px bg-[#3E2C24] flex-grow ml-4"></div>
            </div>
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
              {pinnedArticlesData.map((article) => (
                <article key={article.id} className="bg-[#362720]/60 border border-[#4A362D] rounded-xl p-6 flex flex-col h-full hover:bg-[#362720] hover:border-[#FF7A50]/60 transition-all duration-300 group shadow-md hover:shadow-lg hover:-translate-y-1">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-xs font-semibold px-2 py-1 bg-[#1A120E] text-[#00E5FF] rounded-md border border-[#3E2C24]">{article.category}</span>
                    <span className="text-sm font-mono text-[#917E75]">{article.date}</span>
                  </div>
                  <h3 className="text-xl font-bold text-[#F5ECE6] mb-3 group-hover:text-[#FF7A50] transition-colors leading-snug">{article.title}</h3>
                  <p className="text-[#C4B2A7] text-sm mb-6 flex-grow leading-relaxed">{article.excerpt}</p>
                  <button onClick={() => setCurrentView(article.id)} className="inline-flex items-center text-left text-sm font-semibold text-[#E8D8CE] group-hover:text-[#00E5FF] transition-colors mt-auto w-max">
                    閱讀更多 <ChevronRight className="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" />
                  </button>
                </article>
              ))}
            </div>
          </section>

          {/* 近期文章區塊 */}
          <section id="recent-articles" className="scroll-mt-20">
            <div className="flex items-center gap-2 mb-8">
              <Terminal className="w-6 h-6 text-[#00E5FF]" />
              <h2 className="text-2xl font-bold text-[#F5ECE6]">近期文章</h2>
              <div className="h-px bg-[#3E2C24] flex-grow ml-4"></div>
            </div>
            
            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8 min-h-[300px]">
              {currentRecentArticles.map((article) => (
                <article key={article.id} className="bg-[#1A120E]/80 border border-[#3E2C24] rounded-xl p-6 flex flex-col h-full hover:border-[#00E5FF]/50 transition-all duration-300 group fade-in-fast">
                  <div className="flex justify-between items-center mb-4">
                    <span className="text-xs font-semibold px-2 py-1 bg-[#251A15] text-[#FF7A50] rounded-md border border-[#3E2C24]">{article.category}</span>
                    <span className="text-sm font-mono text-[#917E75]">{article.date}</span>
                  </div>
                  <h3 className="text-xl font-bold text-[#F5ECE6] mb-3 group-hover:text-[#00E5FF] transition-colors leading-snug">{article.title}</h3>
                  <p className="text-[#917E75] text-sm mb-6 flex-grow leading-relaxed">{article.excerpt}</p>
                  <a href={article.url} className="inline-flex items-center text-left text-sm font-semibold text-[#E8D8CE] group-hover:text-[#FF7A50] transition-colors mt-auto w-max">
                    閱讀更多 <ChevronRight className="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" />
                  </a>
                </article>
              ))}
            </div>

            {totalPages > 1 && (
              <div className="flex justify-center items-center gap-6 mt-12 border-t border-[#3E2C24] pt-8">
                <button 
                  onClick={() => { setRecentPage(p => Math.max(1, p - 1)); document.getElementById('recent-articles').scrollIntoView({ behavior: 'smooth' }); }}
                  disabled={recentPage === 1}
                  className={`flex items-center px-4 py-2 rounded-md font-bold transition-all ${recentPage === 1 ? 'bg-transparent text-[#4A362D] cursor-not-allowed' : 'bg-[#251A15] text-[#00E5FF] border border-[#3E2C24] hover:border-[#00E5FF] hover:-translate-x-1'}`}
                >
                  <ChevronLeft className="w-4 h-4 mr-1" /> 上一頁
                </button>
                
                <span className="text-[#917E75] font-mono font-medium flex gap-2">
                  <span className="text-[#E8D8CE]">{recentPage}</span> / <span>{totalPages}</span>
                </span>
                
                <button 
                  onClick={() => { setRecentPage(p => Math.min(totalPages, p + 1)); document.getElementById('recent-articles').scrollIntoView({ behavior: 'smooth' }); }}
                  disabled={recentPage === totalPages}
                  className={`flex items-center px-4 py-2 rounded-md font-bold transition-all ${recentPage === totalPages ? 'bg-transparent text-[#4A362D] cursor-not-allowed' : 'bg-[#251A15] text-[#00E5FF] border border-[#3E2C24] hover:border-[#00E5FF] hover:translate-x-1'}`}
                >
                  下一頁 <ChevronRight className="w-4 h-4 ml-1" />
                </button>
              </div>
            )}
          </section>
        </main>
      );

      return (
        <div className="min-h-screen font-sans text-[#E8D8CE]">
          <nav className="sticky top-0 z-50 bg-[#1A120E]/90 backdrop-blur-md border-b border-[#3E2C24]">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between h-16">
                <div className="flex-shrink-0 flex items-center gap-2 cursor-pointer group" onClick={() => setCurrentView('home')}>
                  <Terminal className="w-6 h-6 text-[#00E5FF] group-hover:text-[#FF7A50] transition-colors" />
                  <span className="font-mono font-bold text-xl text-[#F5ECE6] tracking-wider group-hover:text-[#FF7A50] transition-colors">ADULT_ARTIST</span>
                </div>
                {currentView === 'home' && (
                  <div className="hidden md:block">
                    <div className="ml-10 flex items-baseline space-x-8">
                      <a href="#about" className="hover:text-[#FF7A50] px-3 py-2 rounded-md text-sm font-medium transition-colors">關於我</a>
                      <a href="#pinned-articles" className="hover:text-[#FF7A50] px-3 py-2 rounded-md text-sm font-medium transition-colors">置頂文章</a>
                      <a href="#recent-articles" className="hover:text-[#FF7A50] px-3 py-2 rounded-md text-sm font-medium transition-colors">近期文章</a>
                      <a href="https://portaly.cc/AdultArtist" target="_blank" rel="noopener noreferrer" className="hover:text-[#FF7A50] px-3 py-2 rounded-md text-sm font-medium transition-colors flex items-center gap-1">聯絡我 <ExternalLink className="w-3 h-3" /></a>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </nav>
          
          {currentView === 'home' ? renderHome() : <ArticlePage article={pinnedArticlesData.find(a => a.id === currentView)} onBack={() => setCurrentView('home')} />}
          
          <footer className="border-t border-[#3E2C24] mt-24 bg-[#1A120E]">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex flex-col md:flex-row justify-between items-center gap-6">
              <div className="font-mono text-[#917E75] text-sm">© {new Date().getFullYear()} {personalInfo.name}. All rights reserved.</div>
              <div className="flex items-center space-x-6">
                <a href="https://portaly.cc/AdultArtist" target="_blank" rel="noopener noreferrer" className="text-[#917E75] hover:text-[#FF7A50] transition-colors flex items-center gap-1 font-medium text-sm">Portaly <ExternalLink className="w-4 h-4" /></a>
                <a href="#github" className="text-[#917E75] hover:text-[#00E5FF] transition-colors"><Github className="w-5 h-5" /></a>
                <a href="#twitter" className="text-[#917E75] hover:text-[#00E5FF] transition-colors"><Twitter className="w-5 h-5" /></a>
                <a href="#email" className="text-[#917E75] hover:text-[#FF7A50] transition-colors"><Mail className="w-5 h-5" /></a>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
